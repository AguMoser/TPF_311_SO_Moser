version: "3.8"

services:
  db:
    image: mariadb:latest
    container_name: db
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: utn_user
      MYSQL_PASSWORD: utn_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - red_utn

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: utn_user
      WORDPRESS_DB_PASSWORD: utn_pass
      WORDPRESS_DB_NAME: wordpress
    networks:
      - red_utn

networks:
  red_utn:

volumes:
  db_data:
